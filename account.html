<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dia-Care | My Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --teal: #2C7A7B; --red: #E53E3E; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; }
        .account-card { background: white; border-radius: 20px; padding: 40px; margin-top: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 5px solid var(--teal); }
        .user-icon { font-size: 80px; color: var(--teal); margin-bottom: 20px; }
        .stats-box { background: #f0fdfa; border-radius: 12px; padding: 20px; border: 1px dashed var(--teal); }
        .btn-teal { background: var(--teal); color: white; border: none; }
        .btn-teal:hover { background: #236162; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" style="color: var(--teal);">DIA-CARE</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-semibold">
                    <li><a class="nav-link" href="index.html">Home</a></li>
                    <li><a class="nav-link" href="tracker.html">Tracker</a></li>
                    <li><a class="nav-link active" href="account.html">My Account</a></li>
                    <li><a class="nav-link" href="portal.html" onclick="sessionStorage.clear()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 text-center">
                <div class="account-card">
                    <div class="user-icon">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    
                    <h2 class="fw-bold">Welcome!</h2>
                    <p class="text-muted mb-4" id="displayEmail">User Portal</p>
                    
                    <div class="row text-start g-3">
                        <div class="col-12">
                            <div class="stats-box text-center">
                                <h6 class="mb-2 fw-bold" style="color: var(--teal);">Ready for your daily check?</h6>
                                <p class="small mb-3">Head over to the tracker to log your latest glucose readings and stay on top of your health.</p>
                                <a href="tracker.html" class="btn btn-sm btn-teal px-4">Go to Tracker</a>
                            </div>
                        </div>
                    </div>

                    <div id="updateMessage" class="alert alert-success mt-3" style="display:none;">
                        Settings saved!
                    </div>

                    <button class="btn btn-outline-secondary w-100 mt-4 py-2" onclick="fakeUpdate()">Update Account Settings</button>
                    <a href="portal.html" onclick="sessionStorage.clear()" class="btn btn-link mt-3 text-muted">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function(){
            $('.account-card').hide().fadeIn(800);

            // Get the email from login session
            const savedEmail = sessionStorage.getItem("userEmail") || "Guest User";
            $('#displayEmail').text(savedEmail);
        });

        function fakeUpdate() {
            $('#updateMessage').fadeIn().delay(2000).fadeOut();
        }
    </script>
</body>
</html>

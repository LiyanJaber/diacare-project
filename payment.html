<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dia-Care | Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --teal: #2C7A7B; --red: #E53E3E; --dark: #1A365D; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; display: none; }
        
        .disclaimer-top { background: #FFF5F5; border-bottom: 3px solid var(--red); color: var(--red); padding: 10px; text-align: center; font-weight: bold; }
        
        /* Logo Consistency Fix */
        .navbar-brand img { width: 35px !important; height: auto !important; margin-right: 10px; }

        .payment-box { background: white; border-radius: 25px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border-top: 6px solid var(--teal); }
        .summary-box { background: #f0fdfa; padding: 20px; border-radius: 15px; border: 1px dashed var(--teal); margin-bottom: 30px; }
        
        .form-control { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .form-control:focus { border-color: var(--teal); box-shadow: 0 0 0 0.25rem rgba(44, 122, 123, 0.1); }
        
        .btn-pay { background: var(--teal); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; transition: 0.3s; }
        .btn-pay:hover { background: var(--dark); color: white; transform: translateY(-2px); }
        
        #processing { display: none; }
    </style>
</head>
<body>

    <div class="disclaimer-top">⚠️ SECURE EDUCATIONAL PAYMENT SIMULATION</div>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" style="color: var(--teal);">
                <img src="images/logo.png" alt="Logo"> DIA-CARE
            </a>
            <div class="ms-auto">
                <a class="btn btn-sm btn-outline-secondary" href="booking.html">Cancel</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="payment-box">
                    <h4 class="fw-bold mb-3" style="color: var(--dark);">Booking Summary</h4>
                    <div class="summary-box">
                        <p class="mb-2"><strong>Specialist:</strong> <span id="summaryDoc" class="text-teal"></span></p>
                        <p class="mb-2"><strong>Date:</strong> <span id="summaryDate"></span></p>
                        <p class="mb-0"><strong>Time:</strong> <span id="summaryTime"></span></p>
                    </div>

                    <h4 class="fw-bold mb-3" style="color: var(--dark);">Card Details</h4>
                    <div id="paymentForm">
                        <label class="small fw-bold text-muted">Cardholder Name</label>
                        <input type="text" class="form-control" placeholder="John Doe">
                        
                        <label class="small fw-bold text-muted">Card Number</label>
                        <input type="text" class="form-control" placeholder="0000 0000 0000 0000">
                        
                        <div class="row">
                            <div class="col-6">
                                <label class="small fw-bold text-muted">Expiry</label>
                                <input type="text" class="form-control" placeholder="MM/YY">
                            </div>
                            <div class="col-6">
                                <label class="small fw-bold text-muted">CVV</label>
                                <input type="password" class="form-control" placeholder="***">
                            </div>
                        </div>
                        
                        <button class="btn btn-pay w-100 mt-3 shadow-sm" onclick="confirmPayment()">CONFIRM & PAY</button>
                    </div>

                    <div id="processing" class="text-center py-4">
                        <div class="spinner-border text-teal mb-3" role="status"></div>
                        <h5 class="fw-bold">Processing Payment...</h5>
                        <p class="text-muted small">Please do not refresh the page.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            $('body').fadeIn(800);

            // Fetch details
            const doc = sessionStorage.getItem("appointmentDoc");
            const date = sessionStorage.getItem("appointmentDate");
            const time = sessionStorage.getItem("appointmentTime");

            // Redirect if accessed directly without booking
            if (!doc) {
                window.location.href = "booking.html";
            } else {
                $('#summaryDoc').text(doc);
                $('#summaryDate').text(date);
                $('#summaryTime').text(time);
            }
        });

        function confirmPayment() {
            // Check if user is "logged in" for the confirmation
            const userEmail = sessionStorage.getItem("userEmail") || "Guest";

            $('#paymentForm').fadeOut(400, function() {
                $('#processing').fadeIn();
                
                setTimeout(() => {
                    alert("Success! A confirmation email has been sent to " + userEmail + ".");
                    window.location.href = "account.html";
                }, 2500);
            });
        }
    </script>
</body>
</html>
